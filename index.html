<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xaritadan manzil tanlash</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
      color: #222;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }

    .title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .subtitle {
      text-align: center;
      font-size: 15px;
      color: #666;
      margin-bottom: 12px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      margin-bottom: 14px;
    }

    #map {
      width: 100%;
      height: 430px;
      border-radius: 14px;
      overflow: hidden;
    }

    .info-row {
      margin-bottom: 10px;
      line-height: 1.45;
      font-size: 15px;
      word-break: break-word;
    }

    .label {
      font-weight: 700;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #2a8cff;
      color: #fff;
      transition: 0.2s;
    }

    .btn:disabled {
      background: #9ebfe7;
      cursor: not-allowed;
    }

    .hint {
      font-size: 14px;
      color: #666;
      margin-top: 10px;
      text-align: center;
    }

    .coords {
      font-size: 13px;
      color: #666;
    }

    .loading {
      color: #2a8cff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title" id="pageTitle">Xaritadan manzil tanlang</div>
    <div class="subtitle" id="pageSubtitle">Kerakli joyni xaritada bosing</div>

    <div class="card">
      <div id="map"></div>
      <div class="hint">Joy tanlang, keyin pastdagi tugmani bosing</div>
    </div>

    <div class="card">
      <div class="info-row">
        <span class="label">Manzil:</span>
        <span id="full_address">Tanlanmagan</span>
      </div>

      <div class="info-row">
        <span class="label">Region:</span>
        <span id="region_text">Tanlanmagan</span>
      </div>

      <div class="info-row">
        <span class="label">Tuman/Shahar:</span>
        <span id="district_text">Tanlanmagan</span>
      </div>

      <div class="info-row coords">
        <span class="label">Koordinata:</span>
        <span id="coords_text">Tanlanmagan</span>
      </div>
    </div>

    <button id="sendBtn" class="btn" disabled>Tanlangan manzilni yuborish</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const pageType = (params.get("type") || "from").toLowerCase(); // from | to

    let map;
    let marker = null;

    let selectedData = {
      lat: null,
      lon: null,
      address: "",
      region: "",
      district: ""
    };

    function setupPageText() {
      const title = document.getElementById("pageTitle");
      const subtitle = document.getElementById("pageSubtitle");
      const sendBtn = document.getElementById("sendBtn");

      if (pageType === "to") {
        title.textContent = "Qayerga manzil tanlang";
        subtitle.textContent = "Yetkazish manzilini xaritada belgilang";
        sendBtn.textContent = "Qayerga manzilni yuborish";
      } else {
        title.textContent = "Qayerdan manzil tanlang";
        subtitle.textContent = "Yuk olinadigan joyni xaritada belgilang";
        sendBtn.textContent = "Qayerdan manzilni yuborish";
      }
    }

    function cleanText(value) {
      if (!value) return "";
      return String(value).replace(/\s+/g, " ").trim();
    }

    function normalizeName(value) {
      let text = cleanText(value);
      if (!text) return "";

      const lower = text.toLowerCase();

      const mapNames = {
        "tashkent": "Toshkent",
        "toshkent": "Toshkent",
        "tashkent region": "Toshkent viloyati",
        "toshkent viloyati": "Toshkent viloyati",
        "tashkent province": "Toshkent viloyati",
        "tashkent city": "Toshkent shahri",
        "toshkent city": "Toshkent shahri",
        "toshkent shahri": "Toshkent shahri",

        "samarkand": "Samarqand",
        "samarkand region": "Samarqand viloyati",
        "bukhara": "Buxoro",
        "bukhara region": "Buxoro viloyati",
        "fergana": "Farg‘ona",
        "ferghana": "Farg‘ona",
        "fergana region": "Farg‘ona viloyati",
        "andijan": "Andijon",
        "andijan region": "Andijon viloyati",
        "namangan": "Namangan",
        "namangan region": "Namangan viloyati",
        "jizzakh": "Jizzax",
        "jizzakh region": "Jizzax viloyati",
        "khorezm": "Xorazm",
        "khorezm region": "Xorazm viloyati",
        "navoi": "Navoiy",
        "navoiy": "Navoiy",
        "navoi region": "Navoiy viloyati",
        "kashkadarya": "Qashqadaryo",
        "qashqadaryo": "Qashqadaryo",
        "kashkadarya region": "Qashqadaryo viloyati",
        "surkhandarya": "Surxondaryo",
        "surxondaryo": "Surxondaryo",
        "surkhandarya region": "Surxondaryo viloyati",
        "sirdaryo": "Sirdaryo",
        "sirdaryo region": "Sirdaryo viloyati",
        "republic of karakalpakstan": "Qoraqalpog‘iston Respublikasi",
        "karakalpakstan": "Qoraqalpog‘iston Respublikasi"
      };

      return mapNames[lower] || text;
    }

    function firstNotEmpty(...values) {
      for (const value of values) {
        const cleaned = cleanText(value);
        if (cleaned) return cleaned;
      }
      return "";
    }

    function parseAddressData(addr) {
      const state = normalizeName(addr.state);
      const regionField = normalizeName(addr.region);
      const province = normalizeName(addr.province);
      const county = normalizeName(addr.county);

      const city = normalizeName(addr.city);
      const town = normalizeName(addr.town);
      const village = normalizeName(addr.village);
      const municipality = normalizeName(addr.municipality);

      const cityDistrict = normalizeName(addr.city_district);
      const districtField = normalizeName(addr.district);
      const suburb = normalizeName(addr.suburb);
      const borough = normalizeName(addr.borough);

      let region = "";
      let district = "";

      const allText = [
        state, regionField, province, county,
        city, town, village, municipality,
        cityDistrict, districtField, suburb, borough
      ].join(" ").toLowerCase();

      // 1) Regionni aniqlash
      if (
        allText.includes("toshkent shahri") ||
        allText.includes("tashkent city")
      ) {
        region = "Toshkent shahri";
      } else {
        region =
          firstNotEmpty(
            state,
            regionField,
            province
          );
      }

      // 2) District uchun faqat haqiqiy tuman maydonlari
      district =
        firstNotEmpty(
          cityDistrict,
          districtField,
          suburb,
          borough
        );

      // 3) Agar district yo'q bo'lsa keyin city/town/village
      if (!district) {
        district =
          firstNotEmpty(
            city,
            town,
            village,
            municipality
          );
      }

      // 4) Region bo'sh bo'lsa fallback
      if (!region) {
        region =
          firstNotEmpty(
            state,
            regionField,
            province,
            county,
            city,
            town,
            village,
            municipality
          );
      }

      // 5) Agar region hali ham yo'q bo'lsa districtdan olamiz
      if (!region) {
        region = district;
      }

      // 6) Agar district region bilan bir xil bo'lsa, alternativ qidiramiz
      if (
        district &&
        region &&
        district.toLowerCase() === region.toLowerCase()
      ) {
        const altDistrict =
          firstNotEmpty(
            cityDistrict,
            districtField,
            suburb,
            borough,
            county
          );

        if (
          altDistrict &&
          altDistrict.toLowerCase() !== region.toLowerCase()
        ) {
          district = altDistrict;
        }
      }

      // 7) Hali ham district topilmasa
      if (!district) {
        district = region;
      }

      return {
        region: cleanText(region),
        district: cleanText(district)
      };
    }

    function buildReadableAddress(addr, fallbackDisplayName) {
      const parts = [
        addr.road,
        addr.house_number,
        addr.neighbourhood,
        addr.suburb,
        addr.city_district,
        addr.district,
        addr.city || addr.town || addr.village,
        addr.county,
        addr.state,
        addr.country
      ]
        .map(cleanText)
        .filter(Boolean);

      const uniqueParts = [...new Set(parts)];
      return uniqueParts.length ? uniqueParts.join(", ") : cleanText(fallbackDisplayName || "");
    }

    function updateInfo(loading = false) {
      document.getElementById("full_address").innerHTML = loading
        ? '<span class="loading">Yuklanmoqda...</span>'
        : (selectedData.address || "Tanlanmagan");

      document.getElementById("region_text").textContent =
        selectedData.region || "Tanlanmagan";

      document.getElementById("district_text").textContent =
        selectedData.district || "Tanlanmagan";

      document.getElementById("coords_text").textContent =
        selectedData.lat && selectedData.lon
          ? `${selectedData.lat}, ${selectedData.lon}`
          : "Tanlanmagan";

      document.getElementById("sendBtn").disabled =
        !(selectedData.lat && selectedData.lon && selectedData.region && selectedData.district) || loading;
    }

    function setMarker(lat, lon) {
      if (marker) {
        map.removeLayer(marker);
      }
      marker = L.marker([lat, lon]).addTo(map);
    }

    async function reverseGeocode(lat, lon) {
      const url =
        `https://nominatim.openstreetmap.org/reverse?format=jsonv2` +
        `&lat=${encodeURIComponent(lat)}` +
        `&lon=${encodeURIComponent(lon)}` +
        `&zoom=18&addressdetails=1`;

      const response = await fetch(url, {
        headers: {
          "Accept-Language": "uz,en"
        }
      });

      if (!response.ok) {
        throw new Error("Geocoding xatoligi");
      }

      return await response.json();
    }

    async function handleMapClick(lat, lon) {
      const fixedLat = Number(lat.toFixed(6));
      const fixedLon = Number(lon.toFixed(6));

      selectedData = {
        lat: fixedLat,
        lon: fixedLon,
        address: "",
        region: "",
        district: ""
      };

      setMarker(fixedLat, fixedLon);
      updateInfo(true);

      try {
        const data = await reverseGeocode(fixedLat, fixedLon);
        const addr = data.address || {};
        const parsed = parseAddressData(addr);
        const readableAddress = buildReadableAddress(addr, data.display_name);

        selectedData = {
          lat: fixedLat,
          lon: fixedLon,
          address: readableAddress,
          region: parsed.region,
          district: parsed.district
        };

        console.log("PAGE TYPE:", pageType);
        console.log("RAW ADDRESS:", addr);
        console.log("PARSED:", parsed);
        console.log("SELECTED DATA:", selectedData);

        updateInfo(false);
      } catch (error) {
        console.error(error);

        selectedData = {
          lat: fixedLat,
          lon: fixedLon,
          address: "",
          region: "",
          district: ""
        };

        updateInfo(false);
        alert("Manzilni aniqlab bo‘lmadi. Boshqa joyni tanlab ko‘ring.");
      }
    }

    function initMap() {
      map = L.map("map").setView([41.311081, 69.240562], 11);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap"
      }).addTo(map);

      map.on("click", async function (e) {
        await handleMapClick(e.latlng.lat, e.latlng.lng);
      });
    }

    function buildPayload() {
      if (pageType === "to") {
        return {
          to_lat: selectedData.lat,
          to_lon: selectedData.lon,
          to_address: selectedData.address,
          to_region_key: selectedData.region,
          to_district_key: selectedData.district
        };
      }

      return {
        from_lat: selectedData.lat,
        from_lon: selectedData.lon,
        from_address: selectedData.address,
        from_region_key: selectedData.region,
        from_district_key: selectedData.district
      };
    }

    document.getElementById("sendBtn").addEventListener("click", function () {
      if (!selectedData.lat || !selectedData.lon) return;
      if (!selectedData.region || !selectedData.district) return;

      const payload = buildPayload();
      console.log("SEND DATA:", payload);

      tg.sendData(JSON.stringify(payload));
      tg.close();
    });

    setupPageText();
    initMap();
    updateInfo(false);
  </script>
</body>
</html>
