<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xaritadan tanlash</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #111;
    }

    #map {
      width: 100%;
      height: 60vh;
    }

    .panel {
      padding: 14px;
      background: white;
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      margin-top: -10px;
      position: relative;
      z-index: 500;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .address-box {
      min-height: 68px;
      background: #f7f7f7;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: #1f6bff;
      color: white;
    }

    .btn-primary:disabled {
      background: #9ab8ff;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #777;
      text-align: center;
    }

    /* Emoji marker */
    .emoji-marker {
      font-size: 28px;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <div class="label">Tanlangan manzil</div>
  <div id="address" class="address-box">Hali joy tanlanmagan</div>

  <button id="sendBtn" class="btn btn-primary" disabled>
    ✅ Tasdiqlash va yuborish
  </button>

  <div class="hint">Xaritadan nuqta tanlang</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const params = new URLSearchParams(window.location.search);
const type = params.get("type") || "from";

let selected = null;
let marker = null;

const map = L.map("map", {
  zoomControl: true,
  attributionControl: false
}).setView([41.3111, 69.2797], 12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(map);

const addressBox = document.getElementById("address");
const sendBtn = document.getElementById("sendBtn");

/* 📍 Emoji marker icon */
const emojiIcon = L.divIcon({
  className: "emoji-marker",
  html: "📍",
  iconSize: [30, 30],
  iconAnchor: [15, 30]
});

function getRegion(addr) {
  return (
    addr.state ||
    addr.province ||
    addr.region ||
    addr.city ||
    addr.county ||
    "Toshkent"
  );
}

async function reverseGeocode(lat, lon) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=uz`
    );

    const data = await res.json();
    const addr = data.address || {};

    return {
      address: data.display_name || `${lat}, ${lon}`,
      region: getRegion(addr)
    };
  } catch (e) {
    return {
      address: `${lat}, ${lon}`,
      region: "Toshkent"
    };
  }
}

map.on("click", async function (e) {
  const { lat, lng } = e.latlng;

  if (marker) {
    map.removeLayer(marker);
  }

  marker = L.marker([lat, lng], { icon: emojiIcon }).addTo(map);

  addressBox.innerHTML = "⏳ Manzil aniqlanmoqda...";
  sendBtn.disabled = true;

  const geo = await reverseGeocode(lat, lng);

  selected = {
    lat: lat,
    lon: lng,
    address: geo.address,
    region: geo.region,
    type: type
  };

  addressBox.innerHTML = `
    <b>Adres:</b><br>${geo.address}<br><br>
    <b>Hudud:</b> ${geo.region}
  `;

  sendBtn.disabled = false;
});

sendBtn.addEventListener("click", function () {
  if (!selected) return;

  tg.sendData(JSON.stringify(selected));
  tg.close();
});
</script>

</body>
</html>
