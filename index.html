<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xaritadan tanlash</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #111;
    }

    .topbar {
      padding: 14px 16px;
      background: white;
      border-bottom: 1px solid #eaeaea;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .search-input {
      flex: 1;
      border: 1px solid #d9d9d9;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    .search-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
      background: #1f6bff;
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    .map-wrap {
      position: relative;
      width: 100%;
      height: 58vh;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .center-pin {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -100%);
      z-index: 900;
      pointer-events: none;
      font-size: 34px;
      line-height: 1;
      filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.25));
    }

    .center-pin.bounce {
      animation: pinBounce 0.25s ease;
    }

    @keyframes pinBounce {
      0% { transform: translate(-50%, -100%); }
      50% { transform: translate(-50%, -108%); }
      100% { transform: translate(-50%, -100%); }
    }

    .gps-btn {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 950;
      background: white;
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      cursor: pointer;
    }

    .panel {
      padding: 14px;
      background: white;
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      margin-top: -10px;
      position: relative;
      z-index: 500;
      box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.08);
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .address-box {
      min-height: 72px;
      background: #f7f7f7;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.45;
      margin-bottom: 12px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: #1f6bff;
      color: white;
    }

    .btn-primary:disabled {
      background: #9ab8ff;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #777;
      text-align: center;
    }

    .leaflet-control-attribution {
      display: none !important;
    }

    .leaflet-control-zoom a {
      width: 34px !important;
      height: 34px !important;
      line-height: 34px !important;
      font-size: 18px !important;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">📍 Lokatsiyani tanlang</div>
    <div class="subtitle">Adres yozing yoki xaritani suring</div>

    <div class="search-bar">
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="Masalan: Chilonzor 19-kvartal, Toshkent"
      />
      <button id="searchBtn" class="search-btn">Qidirish</button>
    </div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
    <div id="centerPin" class="center-pin">📍</div>
    <button id="myLocationBtn" class="gps-btn">📍 Mening joylashuvim</button>
  </div>

  <div class="panel">
    <div class="label">Tanlangan manzil</div>
    <div id="address" class="address-box">Joylashuv aniqlanmoqda...</div>
    <button id="sendBtn" class="btn btn-primary" disabled>✅ Tasdiqlash va yuborish</button>
    <div class="hint">Aniq joy tanlash uchun qidiruvdan keyin ham xaritani surishingiz mumkin</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const type = params.get("type") || "from";

    const defaultLat = 41.3111;
    const defaultLon = 69.2797;

    let selected = null;
    let geocodeTimer = null;
    let requestCounter = 0;

    const addressBox = document.getElementById("address");
    const sendBtn = document.getElementById("sendBtn");
    const myLocationBtn = document.getElementById("myLocationBtn");
    const centerPin = document.getElementById("centerPin");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");

    const map = L.map("map", {
      zoomControl: true,
      attributionControl: false
    }).setView([defaultLat, defaultLon], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19
    }).addTo(map);

    function bouncePin() {
      centerPin.classList.remove("bounce");
      void centerPin.offsetWidth;
      centerPin.classList.add("bounce");
    }

    async function reverseGeocode(lat, lon) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=uz`
        );
        const data = await res.json();

        const addr = data.address || {};
        const region =
          addr.state ||
          addr.region ||
          addr.county ||
          addr.city ||
          addr.town ||
          "Toshkent";

        const address = data.display_name || `${lat}, ${lon}`;

        return { address, region };
      } catch (e) {
        return {
          address: `${lat}, ${lon}`,
          region: "Toshkent"
        };
      }
    }

    async function searchPlace(query) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(query)}&accept-language=uz&limit=1`
        );
        const data = await res.json();

        if (!data || !data.length) {
          return null;
        }

        return {
          lat: parseFloat(data[0].lat),
          lon: parseFloat(data[0].lon),
          display_name: data[0].display_name
        };
      } catch (e) {
        return null;
      }
    }

    async function updateSelectedFromCenter() {
      const center = map.getCenter();
      const lat = Number(center.lat.toFixed(7));
      const lon = Number(center.lng.toFixed(7));

      const currentRequest = ++requestCounter;

      addressBox.innerHTML = "⏳ Manzil aniqlanmoqda...";
      sendBtn.disabled = true;

      const geo = await reverseGeocode(lat, lon);

      if (currentRequest !== requestCounter) return;

      selected = {
        lat: lat,
        lon: lon,
        address: geo.address,
        region: geo.region,
        type: type
      };

      addressBox.innerHTML = `
        <b>Adres:</b><br>${geo.address}<br><br>
        <b>Hudud:</b> ${geo.region}
      `;

      sendBtn.disabled = false;
    }

    function scheduleCenterUpdate() {
      if (geocodeTimer) clearTimeout(geocodeTimer);
      geocodeTimer = setTimeout(() => {
        updateSelectedFromCenter();
      }, 450);
    }

    function moveToCurrentLocation() {
      if (!navigator.geolocation) {
        addressBox.innerHTML = "Geolokatsiya ishlamaydi. Xarita orqali joy tanlang.";
        return;
      }

      myLocationBtn.disabled = true;
      myLocationBtn.textContent = "⏳ Aniqlanmoqda...";

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          map.setView([lat, lon], 17, { animate: true });
          bouncePin();

          myLocationBtn.disabled = false;
          myLocationBtn.textContent = "📍 Mening joylashuvim";

          scheduleCenterUpdate();
        },
        () => {
          myLocationBtn.disabled = false;
          myLocationBtn.textContent = "📍 Mening joylashuvim";
          addressBox.innerHTML = "Joylashuv olinmadi. Xarita orqali joy tanlang.";
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    async function handleSearch() {
      const query = searchInput.value.trim();

      if (!query) {
        addressBox.innerHTML = "❌ Avval manzil yozing.";
        return;
      }

      searchBtn.disabled = true;
      searchBtn.textContent = "⏳ Qidirilyapti...";
      addressBox.innerHTML = "⏳ Qidirilyapti...";
      sendBtn.disabled = true;

      const result = await searchPlace(query);

      searchBtn.disabled = false;
      searchBtn.textContent = "Qidirish";

      if (!result) {
        addressBox.innerHTML = "❌ Manzil topilmadi. Boshqacha yozib ko‘ring.";
        return;
      }

      map.setView([result.lat, result.lon], 17, { animate: true });
      bouncePin();
      scheduleCenterUpdate();
    }

    map.on("movestart", () => {
      sendBtn.disabled = true;
      addressBox.innerHTML = "⏳ Manzil aniqlanmoqda...";
    });

    map.on("moveend", () => {
      bouncePin();
      scheduleCenterUpdate();
    });

    myLocationBtn.addEventListener("click", () => {
      moveToCurrentLocation();
    });

    searchBtn.addEventListener("click", () => {
      handleSearch();
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        handleSearch();
      }
    });

    sendBtn.addEventListener("click", () => {
      if (!selected) return;
      tg.sendData(JSON.stringify(selected));
      tg.close();
    });

    moveToCurrentLocation();

    setTimeout(() => {
      if (!selected) {
        scheduleCenterUpdate();
      }
    }, 1200);
  </script>
</body>
</html>
