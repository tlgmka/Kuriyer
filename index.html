<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xaritadan tanlash</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #111;
    }

    .topbar {
      padding: 14px 16px;
      background: white;
      border-bottom: 1px solid #eaeaea;
      position: sticky;
      top: 0;
      z-index: 3000;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
    }

    .map-wrap {
      position: relative;
      width: 100%;
      height: 55vh;
      z-index: 1;
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .search-box {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 5000;
    }

    .search-input {
      width: 100%;
      border: 1px solid #dcdcdc;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
    }

    .search-results {
      margin-top: 8px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      max-height: 220px;
      overflow-y: auto;
      display: none;
      border: 1px solid #ececec;
    }

    .search-item {
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.35;
      border-bottom: 1px solid #f1f1f1;
      cursor: pointer;
    }

    .search-item:last-child {
      border-bottom: none;
    }

    .search-item:hover {
      background: #f7f9ff;
    }

    .panel {
      padding: 14px;
      background: white;
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      margin-top: -10px;
      position: relative;
      z-index: 1000;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .address-box {
      min-height: 92px;
      max-height: 180px;
      overflow-y: auto;
      background: #f7f7f7;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: #1f6bff;
      color: white;
    }

    .btn-primary:disabled {
      background: #9ab8ff;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #777;
      text-align: center;
    }

    .leaflet-control-zoom a {
      width: 34px !important;
      height: 34px !important;
      line-height: 34px !important;
      font-size: 18px !important;
    }

    .loading,
    .empty {
      color: #666;
      padding: 12px 14px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">📍 Lokatsiyani tanlang</div>
    <div class="subtitle">Xaritadan nuqta tanlang yoki manzil qidiring</div>
  </div>

  <div class="map-wrap">
    <div class="search-box">
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="🔎 Manzil qidiring..."
        autocomplete="off"
      />
      <div id="searchResults" class="search-results"></div>
    </div>
    <div id="map"></div>
  </div>

  <div class="panel">
    <div class="label">Tanlangan manzil</div>
    <div id="address" class="address-box">Hali joy tanlanmagan</div>
    <button id="sendBtn" class="btn btn-primary" disabled>✅ Tasdiqlash va yuborish</button>
    <div class="hint">Avval xaritadan nuqta tanlang yoki qidiruvdan tanlang</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const type = params.get("type") || "from";

    let selected = null;
    let marker = null;
    let searchTimer = null;

    const addressBox = document.getElementById("address");
    const sendBtn = document.getElementById("sendBtn");
    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");

    const map = L.map("map", {
      zoomControl: true,
      attributionControl: false
    }).setView([41.3111, 69.2797], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19
    }).addTo(map);

    const TASHKENT_CITY_DISTRICTS = [
      "bektemir",
      "chilonzor",
      "mirobod",
      "mirabad",
      "mirzo ulug'bek",
      "mirzo ulugbek",
      "olmazor",
      "sergeli",
      "shayxontohur",
      "shaykhantahur",
      "uchtepa",
      "yakkasaroy",
      "yashnobod",
      "yunusobod",
      "yangi hayot"
    ];

    function titleCaseUz(str = "") {
      return str
        .split(" ")
        .filter(Boolean)
        .map(word => {
          return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
        })
        .join(" ");
    }

    function normalizeText(value = "") {
      return String(value)
        .toLowerCase()
        .replace(/oʻ/g, "o'")
        .replace(/gʻ/g, "g'")
        .replace(/’/g, "'")
        .replace(/`/g, "'")
        .replace(/\s+/g, " ")
        .trim();
    }

    function cleanName(value = "") {
      return String(value)
        .replace(/\b(district)\b/gi, "")
        .replace(/\b(tumani|tumani\.)\b/gi, "")
        .replace(/\b(rayoni|rayon)\b/gi, "")
        .replace(/\b(shahri)\b/gi, "")
        .replace(/\s+/g, " ")
        .replace(/,+/g, "")
        .trim();
    }

    function prettifyDistrictName(value = "") {
      const v = normalizeText(cleanName(value));

      const map = {
        "mirabad": "Mirabad",
        "mirobod": "Mirobod",
        "shaykhantahur": "Shayxontohur",
        "shayxontohur": "Shayxontohur",
        "mirzo ulugbek": "Mirzo Ulug‘bek",
        "mirzo ulug'bek": "Mirzo Ulug‘bek",
        "yangi hayot": "Yangi hayot",
        "chilonzor": "Chilonzor",
        "sergeli": "Sergeli",
        "olmazor": "Olmazor",
        "uchtepa": "Uchtepa",
        "yakkasaroy": "Yakkasaroy",
        "yashnobod": "Yashnobod",
        "yunusobod": "Yunusobod",
        "bektemir": "Bektemir"
      };

      return map[v] || titleCaseUz(cleanName(value));
    }

    function normalizeUzbekRegion(value = "") {
      const v = normalizeText(value);

      if (!v) return "";

      if (v.includes("toshkent shah") || v === "toshkent city" || v === "tashkent city") {
        return "Toshkent shahri";
      }
      if (v.includes("toshkent")) return "Toshkent viloyati";
      if (v.includes("samarqand")) return "Samarqand viloyati";
      if (v.includes("buxoro")) return "Buxoro viloyati";
      if (v.includes("andijon")) return "Andijon viloyati";
      if (v.includes("farg")) return "Farg‘ona viloyati";
      if (v.includes("namangan")) return "Namangan viloyati";
      if (v.includes("jizzax")) return "Jizzax viloyati";
      if (v.includes("sirdaryo")) return "Sirdaryo viloyati";
      if (v.includes("qashqadaryo")) return "Qashqadaryo viloyati";
      if (v.includes("surxondaryo")) return "Surxondaryo viloyati";
      if (v.includes("navoiy")) return "Navoiy viloyati";
      if (v.includes("xorazm")) return "Xorazm viloyati";
      if (v.includes("qoraqalpog")) return "Qoraqalpog‘iston Respublikasi";

      return titleCaseUz(value);
    }

    function looksLikeTashkentCity(addr = {}, displayName = "") {
      const values = [
        addr.city,
        addr.town,
        addr.municipality,
        addr.state,
        addr.region,
        displayName
      ]
        .filter(Boolean)
        .map(normalizeText)
        .join(" | ");

      return values.includes("toshkent")
        || values.includes("tashkent")
        || values.includes("toshkent shahri")
        || values.includes("tashkent city");
    }

    function extractDistrictFromDisplayName(displayName = "") {
      const text = normalizeText(displayName);

      const patterns = [
        /([a-zʻ'`-]+(?:\s+[a-zʻ'`-]+)*)\s+tumani/g,
        /([a-zʻ'`-]+(?:\s+[a-zʻ'`-]+)*)\s+district/g
      ];

      for (const pattern of patterns) {
        let match;
        while ((match = pattern.exec(text)) !== null) {
          const found = cleanName(match[1]);
          const normalizedFound = normalizeText(found);

          for (const known of TASHKENT_CITY_DISTRICTS) {
            if (normalizedFound === normalizeText(known)) {
              return prettifyDistrictName(found);
            }
          }

          if (found) {
            return prettifyDistrictName(found);
          }
        }
      }

      for (const known of TASHKENT_CITY_DISTRICTS) {
        if (text.includes(normalizeText(known) + " tumani")) {
          return prettifyDistrictName(known);
        }
        if (text.includes(normalizeText(known) + " district")) {
          return prettifyDistrictName(known);
        }
      }

      return "";
    }

    function pickBestDistrict(addr = {}, displayName = "", isTashkentCity = false) {
      const strongCandidates = [
        addr.city_district,
        addr.state_district,
        addr.district,
        addr.county,
        addr.borough
      ];

      for (const item of strongCandidates) {
        const cleaned = cleanName(item || "");
        if (!cleaned) continue;

        const normalized = normalizeText(cleaned);

        if (isTashkentCity) {
          for (const known of TASHKENT_CITY_DISTRICTS) {
            if (normalized === normalizeText(known)) {
              return prettifyDistrictName(cleaned);
            }
          }
        } else {
          if (normalized !== "toshkent" && normalized !== "uzbekiston" && normalized !== "o'zbekiston") {
            return titleCaseUz(cleaned);
          }
        }
      }

      const fromDisplay = extractDistrictFromDisplayName(displayName);
      if (fromDisplay) return fromDisplay;

      const mediumCandidates = [
        addr.suburb,
        addr.quarter,
        addr.neighbourhood,
        addr.residential,
        addr.village,
        addr.town,
        addr.city,
        addr.municipality
      ];

      for (const item of mediumCandidates) {
        const cleaned = cleanName(item || "");
        if (!cleaned) continue;

        const normalized = normalizeText(cleaned);

        if (isTashkentCity) {
          for (const known of TASHKENT_CITY_DISTRICTS) {
            if (normalized === normalizeText(known)) {
              return prettifyDistrictName(cleaned);
            }
          }
        } else {
          if (normalized !== "toshkent" && normalized !== "uzbekiston" && normalized !== "o'zbekiston") {
            return titleCaseUz(cleaned);
          }
        }
      }

      return "";
    }

    function extractRegionDistrict(addr = {}, displayName = "") {
      const isTashkentCity = looksLikeTashkentCity(addr, displayName);

      let region = "";
      let district = "";

      if (isTashkentCity) {
        region = "Toshkent shahri";
        district = pickBestDistrict(addr, displayName, true);

        if (!district) {
          district = "Toshkent";
        }

        return { region, district };
      }

      region = normalizeUzbekRegion(
        addr.state ||
        addr.region ||
        addr.province ||
        addr.county ||
        addr.city ||
        ""
      );

      district = pickBestDistrict(addr, displayName, false);

      if (!district) {
        district = region
          .replace(" viloyati", "")
          .replace(" shahri", "")
          .replace(" Respublikasi", "")
          .trim();
      }

      return { region, district };
    }

    async function reverseGeocode(lat, lon) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&addressdetails=1&accept-language=uz`
        );
        const data = await res.json();

        const addr = data.address || {};
        const parsed = extractRegionDistrict(addr, data.display_name || "");

        return {
          address: data.display_name || `${lat}, ${lon}`,
          region: parsed.region || "Toshkent shahri",
          district: parsed.district || "Toshkent"
        };
      } catch (e) {
        return {
          address: `${lat}, ${lon}`,
          region: "Toshkent shahri",
          district: "Toshkent"
        };
      }
    }

    async function applySelectedPoint(lat, lon, moveMap = true) {
      if (marker) {
        map.removeLayer(marker);
      }

      marker = L.marker([lat, lon]).addTo(map);

      if (moveMap) {
        map.setView([lat, lon], 16);
      }

      addressBox.innerHTML = "⏳ Manzil aniqlanmoqda...";
      sendBtn.disabled = true;

      const geo = await reverseGeocode(lat, lon);

      selected = {
        lat: lat,
        lon: lon,
        address: geo.address,
        region: geo.region,
        district: geo.district,
        type: type
      };

      addressBox.innerHTML = `
        <b>Adres:</b><br>${geo.address}<br><br>
        <b>Viloyat:</b> ${geo.region}<br>
        <b>Tuman/Shahar:</b> ${geo.district}
      `;

      sendBtn.disabled = false;
    }

    map.on("click", async function (e) {
      const { lat, lng } = e.latlng;
      searchResults.style.display = "none";
      await applySelectedPoint(lat, lng, false);
    });

    async function searchPlaces(query) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(query)}&countrycodes=uz&limit=8&addressdetails=1&accept-language=uz`
        );
        return await res.json();
      } catch (e) {
        return [];
      }
    }

    function renderSearchResults(items) {
      if (!items.length) {
        searchResults.innerHTML = `<div class="empty">Hech narsa topilmadi</div>`;
        searchResults.style.display = "block";
        return;
      }

      searchResults.innerHTML = items.map((item, index) => {
        return `
          <div class="search-item" data-index="${index}">
            ${item.display_name}
          </div>
        `;
      }).join("");

      searchResults.style.display = "block";

      const nodes = searchResults.querySelectorAll(".search-item");
      nodes.forEach(node => {
        node.addEventListener("click", async function () {
          const index = Number(this.dataset.index);
          const item = items[index];
          searchInput.value = item.display_name;
          searchResults.style.display = "none";
          await applySelectedPoint(Number(item.lat), Number(item.lon), true);
        });
      });
    }

    searchInput.addEventListener("input", function () {
      const value = this.value.trim();

      clearTimeout(searchTimer);

      if (value.length < 3) {
        searchResults.style.display = "none";
        return;
      }

      searchTimer = setTimeout(async () => {
        searchResults.innerHTML = `<div class="loading">Qidirilmoqda...</div>`;
        searchResults.style.display = "block";

        const results = await searchPlaces(value);
        renderSearchResults(results);
      }, 400);
    });

    document.addEventListener("click", function (e) {
      const insideSearch = e.target.closest(".search-box");
      if (!insideSearch) {
        searchResults.style.display = "none";
      }
    });

    sendBtn.addEventListener("click", function () {
      if (!selected) return;
      tg.sendData(JSON.stringify(selected));
      tg.close();
    });
  </script>
</body>
</html>
