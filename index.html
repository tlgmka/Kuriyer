<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const params = new URLSearchParams(window.location.search);
  const type = params.get("type") || "from";

  let selected = null;
  let marker = null;

  const map = L.map("map", {
    zoomControl: true,
    attributionControl: false
  }).setView([41.3111, 69.2797], 12);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);

  const addressBox = document.getElementById("address");
  const sendBtn = document.getElementById("sendBtn");

  async function reverseGeocode(lat, lon) {
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&addressdetails=1&accept-language=uz`
      );
      const data = await res.json();

      const addr = data.address || {};
      const region = addr.state || addr.region || addr.county || addr.city || "Toshkent";
      const district =
        addr.city_district ||
        addr.state_district ||
        addr.district ||
        addr.county ||
        addr.city ||
        addr.town ||
        "Toshkent";

      return {
        address: data.display_name || `${lat}, ${lon}`,
        region,
        district
      };
    } catch (e) {
      return {
        address: `${lat}, ${lon}`,
        region: "Toshkent",
        district: "Toshkent"
      };
    }
  }

  async function setLocation(lat, lon, moveMap = true) {
    if (marker) {
      map.removeLayer(marker);
    }

    marker = L.marker([lat, lon]).addTo(map);

    if (moveMap) {
      map.setView([lat, lon], 16);
    }

    addressBox.innerHTML = "⏳ Manzil aniqlanmoqda...";
    sendBtn.disabled = true;

    const geo = await reverseGeocode(lat, lon);

    selected = {
      lat: lat,
      lon: lon,
      address: geo.address,
      region: geo.region,
      district: geo.district,
      type: type
    };

    addressBox.innerHTML = `
      <b>Adres:</b><br>${geo.address}<br><br>
      <b>Viloyat:</b> ${geo.region}<br>
      <b>Tuman/Shahar:</b> ${geo.district}
    `;

    sendBtn.disabled = false;
  }

  function loadCurrentLocation() {
    if (!navigator.geolocation) {
      addressBox.innerHTML = "Geolokatsiya bu qurilmada ishlamaydi";
      return;
    }

    addressBox.innerHTML = "⏳ Turgan joy aniqlanmoqda...";

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        await setLocation(lat, lon, true);
      },
      () => {
        addressBox.innerHTML = "Joylashuvga ruxsat berilmadi. Xaritada nuqta tanlang.";
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      }
    );
  }

  map.on("click", async function (e) {
    const { lat, lng } = e.latlng;
    await setLocation(lat, lng, false);
  });

  sendBtn.addEventListener("click", function () {
    if (!selected) return;
    tg.sendData(JSON.stringify(selected));
    tg.close();
  });

  window.addEventListener("load", function () {
    loadCurrentLocation();
  });
</script>
