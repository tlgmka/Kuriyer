<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Xaritadan tanlash</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    :root {
      --bg: #eef3fb;
      --card: rgba(255, 255, 255, 0.96);
      --text: #101828;
      --muted: #667085;
      --line: rgba(16, 24, 40, 0.08);
      --primary: #2563eb;
      --shadow-lg: 0 18px 40px rgba(15, 23, 42, 0.14);
      --shadow-md: 0 10px 24px rgba(15, 23, 42, 0.10);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #f6f9ff 0%, #eef4fb 100%);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: 14px 14px 12px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 4000;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .map-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .search-box {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 5000;
    }

    .search-shell {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 15px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .search-icon {
      padding-left: 12px;
      font-size: 14px;
      color: #64748b;
    }

    .search-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      padding: 12px 12px 12px 8px;
      font-size: 13px;
      color: var(--text);
    }

    .search-input::placeholder {
      color: #94a3b8;
    }

    .search-results {
      margin-top: 8px;
      background: rgba(255,255,255,0.98);
      border-radius: 15px;
      box-shadow: var(--shadow-lg);
      max-height: 220px;
      overflow-y: auto;
      display: none;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .search-item {
      padding: 11px 12px;
      font-size: 13px;
      line-height: 1.38;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      cursor: pointer;
      transition: background 0.18s ease;
    }

    .search-item:last-child {
      border-bottom: none;
    }

    .search-item:hover {
      background: #f8fbff;
    }

    .gps-btn {
      position: absolute;
      right: 12px;
      bottom: 150px;
      z-index: 2500;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow-md);
      font-size: 16px;
      cursor: pointer;
    }

    .panel {
      position: relative;
      z-index: 3000;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top-left-radius: 22px;
      border-top-right-radius: 22px;
      box-shadow: 0 -18px 40px rgba(15, 23, 42, 0.12);
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
      margin-top: -8px;
    }

    .grabber {
      width: 38px;
      height: 5px;
      border-radius: 999px;
      background: #d0d5dd;
      margin: 0 auto 12px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .address-box {
      min-height: 96px;
      max-height: 170px;
      overflow-y: auto;
      background: linear-gradient(180deg, #f8fbff 0%, #f4f7fb 100%);
      border: 1px solid rgba(37, 99, 235, 0.08);
      border-radius: 15px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 12px;
      word-break: break-word;
      color: #1f2937;
    }

    .meta-title {
      display: inline-block;
      min-width: 102px;
      color: #475467;
      font-weight: 700;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 15px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .btn-primary {
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.26);
    }

    .btn-primary:disabled {
      background: linear-gradient(180deg, #9ec0ff 0%, #88b0ff 100%);
      box-shadow: none;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #667085;
      text-align: center;
      line-height: 1.4;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #64748b;
    }

    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid #dbeafe;
      border-top-color: #3b82f6;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }

    .loading,
    .empty {
      color: #64748b;
      padding: 12px;
      font-size: 13px;
    }

    .leaflet-control-zoom {
      margin-top: 70px !important;
      margin-right: 12px !important;
    }

    .leaflet-control-zoom a {
      width: 34px !important;
      height: 34px !important;
      line-height: 34px !important;
      font-size: 17px !important;
      border-radius: 10px !important;
      box-shadow: var(--shadow-md);
      border: none !important;
    }

    .leaflet-top.leaflet-left {
      left: auto;
      right: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">📍 Lokatsiyani tanlang</div>
    <div class="subtitle">Xaritani suring yoki manzil qidiring</div>
  </div>

  <div class="map-wrap">
    <div class="search-box">
      <div class="search-shell">
        <div class="search-icon">🔎</div>
        <input
          id="searchInput"
          class="search-input"
          type="text"
          placeholder="Manzil qidiring..."
          autocomplete="off"
        />
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>

    <div id="map"></div>

    <button id="gpsBtn" class="gps-btn" title="Mening joyim">📡</button>
  </div>

  <div class="panel">
    <div class="grabber"></div>
    <div class="label">Tanlangan manzil</div>
    <div id="address" class="address-box">Hali joy tanlanmagan</div>
    <button id="sendBtn" class="btn btn-primary" disabled>✅ Tasdiqlash</button>
    <div class="hint">Marker turgan joy bo‘yicha manzil olinadi</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const type = params.get("type") || "from";

    let selected = null;
    let marker = null;
    let searchTimer = null;
    let reverseTimer = null;

    const addressBox = document.getElementById("address");
    const sendBtn = document.getElementById("sendBtn");
    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");
    const gpsBtn = document.getElementById("gpsBtn");

    const map = L.map("map", {
      zoomControl: true,
      attributionControl: false
    }).setView([41.3111, 69.2797], 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19
    }).addTo(map);

    const TASHKENT_CITY_DISTRICTS = [
      "bektemir",
      "chilonzor",
      "mirobod",
      "mirabad",
      "mirzo ulug'bek",
      "mirzo ulugbek",
      "olmazor",
      "sergeli",
      "shayxontohur",
      "shaykhantahur",
      "uchtepa",
      "yakkasaroy",
      "yashnobod",
      "yunusobod",
      "yangi hayot"
    ];

    function titleCaseUz(str = "") {
      return str
        .split(" ")
        .filter(Boolean)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(" ");
    }

    function normalizeText(value = "") {
      return String(value)
        .toLowerCase()
        .replace(/oʻ/g, "o'")
        .replace(/gʻ/g, "g'")
        .replace(/’/g, "'")
        .replace(/`/g, "'")
        .replace(/\s+/g, " ")
        .trim();
    }

    function cleanName(value = "") {
      return String(value)
        .replace(/\b(district)\b/gi, "")
        .replace(/\b(tumani|tumani\.)\b/gi, "")
        .replace(/\b(rayoni|rayon)\b/gi, "")
        .replace(/\b(shahri)\b/gi, "")
        .replace(/\s+/g, " ")
        .replace(/,+/g, "")
        .trim();
    }

    function isCodeLikePlace(value = "") {
      const v = normalizeText(cleanName(value));
      if (!v) return true;

      return /^s\d+$/i.test(v) ||
             /^[a-z]\d+$/i.test(v) ||
             /^\d+$/.test(v) ||
             /^[a-z0-9-]+$/.test(v) && /\d/.test(v);
    }

    function prettifyDistrictName(value = "") {
      const v = normalizeText(cleanName(value));
      const mapNames = {
        "mirabad": "Mirabad",
        "mirobod": "Mirobod",
        "shaykhantahur": "Shayxontohur",
        "shayxontohur": "Shayxontohur",
        "mirzo ulugbek": "Mirzo Ulug‘bek",
        "mirzo ulug'bek": "Mirzo Ulug‘bek",
        "yangi hayot": "Yangi hayot",
        "chilonzor": "Chilonzor",
        "sergeli": "Sergeli",
        "olmazor": "Olmazor",
        "uchtepa": "Uchtepa",
        "yakkasaroy": "Yakkasaroy",
        "yashnobod": "Yashnobod",
        "yunusobod": "Yunusobod",
        "bektemir": "Bektemir"
      };
      return mapNames[v] || titleCaseUz(cleanName(value));
    }

    function normalizeUzbekRegion(value = "") {
      const v = normalizeText(value);

      if (!v) return "";
      if (v.includes("toshkent shah") || v === "toshkent city" || v === "tashkent city") return "Toshkent shahri";
      if (v.includes("toshkent")) return "Toshkent viloyati";
      if (v.includes("samarqand")) return "Samarqand viloyati";
      if (v.includes("buxoro")) return "Buxoro viloyati";
      if (v.includes("andijon")) return "Andijon viloyati";
      if (v.includes("farg")) return "Farg‘ona viloyati";
      if (v.includes("namangan")) return "Namangan viloyati";
      if (v.includes("jizzax")) return "Jizzax viloyati";
      if (v.includes("sirdaryo")) return "Sirdaryo viloyati";
      if (v.includes("qashqadaryo")) return "Qashqadaryo viloyati";
      if (v.includes("surxondaryo")) return "Surxondaryo viloyati";
      if (v.includes("navoiy")) return "Navoiy viloyati";
      if (v.includes("xorazm")) return "Xorazm viloyati";
      if (v.includes("qoraqalpog")) return "Qoraqalpog‘iston Respublikasi";

      return titleCaseUz(value);
    }

    function looksLikeTashkentCity(addr = {}, displayName = "") {
      const values = [
        addr.city,
        addr.town,
        addr.municipality,
        addr.state,
        addr.region,
        displayName
      ].filter(Boolean).map(normalizeText).join(" | ");

      return values.includes("toshkent")
        || values.includes("tashkent")
        || values.includes("toshkent shahri")
        || values.includes("tashkent city");
    }

    function extractDistrictFromDisplayName(displayName = "") {
      const text = normalizeText(displayName);

      const patterns = [
        /([a-zʻ'`-]+(?:\s+[a-zʻ'`-]+)*)\s+tumani/g,
        /([a-zʻ'`-]+(?:\s+[a-zʻ'`-]+)*)\s+district/g
      ];

      for (const pattern of patterns) {
        let match;
        while ((match = pattern.exec(text)) !== null) {
          const found = cleanName(match[1]);
          if (!found || isCodeLikePlace(found)) continue;

          const normalizedFound = normalizeText(found);

          for (const known of TASHKENT_CITY_DISTRICTS) {
            if (normalizedFound === normalizeText(known)) {
              return prettifyDistrictName(found);
            }
          }

          return prettifyDistrictName(found);
        }
      }

      for (const known of TASHKENT_CITY_DISTRICTS) {
        if (text.includes(normalizeText(known) + " tumani")) return prettifyDistrictName(known);
        if (text.includes(normalizeText(known) + " district")) return prettifyDistrictName(known);
      }

      return "";
    }

    function validCandidate(value = "") {
      const cleaned = cleanName(value || "");
      const normalized = normalizeText(cleaned);

      if (!cleaned) return false;
      if (normalized === "toshkent") return false;
      if (normalized === "uzbekiston") return false;
      if (normalized === "o'zbekiston") return false;
      if (isCodeLikePlace(cleaned)) return false;

      return true;
    }

    function pickBestDistrict(addr = {}, displayName = "", isTashkentCity = false, region = "") {
      const strongCandidates = [
        addr.city_district,
        addr.state_district,
        addr.district,
        addr.county,
        addr.borough
      ];

      for (const item of strongCandidates) {
        const cleaned = cleanName(item || "");
        if (!validCandidate(cleaned)) continue;

        const normalized = normalizeText(cleaned);

        if (isTashkentCity) {
          for (const known of TASHKENT_CITY_DISTRICTS) {
            if (normalized === normalizeText(known)) {
              return prettifyDistrictName(cleaned);
            }
          }
        } else {
          return titleCaseUz(cleaned);
        }
      }

      const fromDisplay = extractDistrictFromDisplayName(displayName);
      if (fromDisplay && validCandidate(fromDisplay)) return fromDisplay;

      const mediumCandidates = [
        addr.suburb,
        addr.quarter,
        addr.neighbourhood,
        addr.residential,
        addr.village,
        addr.town,
        addr.city,
        addr.municipality
      ];

      for (const item of mediumCandidates) {
        const cleaned = cleanName(item || "");
        if (!validCandidate(cleaned)) continue;

        const normalized = normalizeText(cleaned);

        if (isTashkentCity) {
          for (const known of TASHKENT_CITY_DISTRICTS) {
            if (normalized === normalizeText(known)) {
              return prettifyDistrictName(cleaned);
            }
          }
        } else {
          return titleCaseUz(cleaned);
        }
      }

      const regionNorm = normalizeText(region);
      if (regionNorm.includes("jizzax")) return "Jizzax";

      return "";
    }

    function extractRegionDistrict(addr = {}, displayName = "") {
      const isTashkentCity = looksLikeTashkentCity(addr, displayName);

      let region = "";
      let district = "";

      if (isTashkentCity) {
        region = "Toshkent shahri";
        district = pickBestDistrict(addr, displayName, true, region) || "Toshkent";
        return { region, district };
      }

      region = normalizeUzbekRegion(
        addr.state ||
        addr.region ||
        addr.province ||
        addr.county ||
        addr.city ||
        ""
      );

      district = pickBestDistrict(addr, displayName, false, region);

      if (!district) {
        district = cleanName(
          addr.city ||
          addr.town ||
          addr.village ||
          addr.municipality ||
          ""
        );
      }

      if (!district || isCodeLikePlace(district)) {
        district = region
          .replace(" viloyati", "")
          .replace(" shahri", "")
          .replace(" Respublikasi", "")
          .trim();
      }

      return {
        region,
        district: titleCaseUz(district)
      };
    }

    function setLoadingText() {
      addressBox.innerHTML = `
        <div class="status-row">
          <span class="spinner"></span>
          <span>Manzil aniqlanmoqda...</span>
        </div>
      `;
      sendBtn.disabled = true;
    }

    function renderAddressBox(geo) {
      addressBox.innerHTML = `
        <div><span class="meta-title">Adres:</span> ${geo.address}</div>
        <div style="margin-top:10px;"><span class="meta-title">Viloyat:</span> ${geo.region}</div>
        <div style="margin-top:6px;"><span class="meta-title">Tuman/Shahar:</span> ${geo.district}</div>
      `;
    }

    async function reverseGeocode(lat, lon) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&addressdetails=1&accept-language=uz`
        );
        const data = await res.json();

        const addr = data.address || {};
        const parsed = extractRegionDistrict(addr, data.display_name || "");

        return {
          address: data.display_name || `${lat}, ${lon}`,
          region: parsed.region || "Toshkent shahri",
          district: parsed.district || "Toshkent"
        };
      } catch (e) {
        return {
          address: `${lat}, ${lon}`,
          region: "Toshkent shahri",
          district: "Toshkent"
        };
      }
    }

    function ensureMarker(lat, lon) {
      if (!marker) {
        marker = L.marker([lat, lon]).addTo(map);
      } else {
        marker.setLatLng([lat, lon]);
      }
    }

    async function updateCenterLocation() {
      const center = map.getCenter();
      const lat = center.lat;
      const lon = center.lng;

      ensureMarker(lat, lon);
      setLoadingText();

      const geo = await reverseGeocode(lat, lon);

      selected = {
        lat,
        lon,
        address: geo.address,
        region: geo.region,
        district: geo.district,
        type
      };

      renderAddressBox(geo);
      sendBtn.disabled = false;
    }

    function debounceUpdateCenter() {
      clearTimeout(reverseTimer);
      reverseTimer = setTimeout(updateCenterLocation, 300);
    }

    map.on("moveend", function () {
      debounceUpdateCenter();
    });

    async function moveToLocation(lat, lon, zoom = 16) {
      map.setView([lat, lon], zoom, { animate: true });
      ensureMarker(lat, lon);
    }

    async function goToUserLocation() {
      if (!navigator.geolocation) {
        updateCenterLocation();
        return;
      }

      setLoadingText();

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          await moveToLocation(lat, lon, 17);
          setTimeout(updateCenterLocation, 350);
        },
        async () => {
          await updateCenterLocation();
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    async function searchPlaces(query) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(query)}&countrycodes=uz&limit=8&addressdetails=1&accept-language=uz`
        );
        return await res.json();
      } catch (e) {
        return [];
      }
    }

    function renderSearchResults(items) {
      if (!items.length) {
        searchResults.innerHTML = `<div class="empty">Hech narsa topilmadi</div>`;
        searchResults.style.display = "block";
        return;
      }

      searchResults.innerHTML = items.map((item, index) => `
        <div class="search-item" data-index="${index}">
          ${item.display_name}
        </div>
      `).join("");

      searchResults.style.display = "block";

      const nodes = searchResults.querySelectorAll(".search-item");
      nodes.forEach(node => {
        node.addEventListener("click", async function () {
          const index = Number(this.dataset.index);
          const item = items[index];
          searchInput.value = item.display_name;
          searchResults.style.display = "none";
          await moveToLocation(Number(item.lat), Number(item.lon), 17);
          setTimeout(updateCenterLocation, 350);
        });
      });
    }

    searchInput.addEventListener("input", function () {
      const value = this.value.trim();
      clearTimeout(searchTimer);

      if (value.length < 3) {
        searchResults.style.display = "none";
        return;
      }

      searchTimer = setTimeout(async () => {
        searchResults.innerHTML = `<div class="loading">Qidirilmoqda...</div>`;
        searchResults.style.display = "block";
        const results = await searchPlaces(value);
        renderSearchResults(results);
      }, 300);
    });

    document.addEventListener("click", function (e) {
      const insideSearch = e.target.closest(".search-box");
      if (!insideSearch) {
        searchResults.style.display = "none";
      }
    });

    gpsBtn.addEventListener("click", goToUserLocation);

    sendBtn.addEventListener("click", function () {
      if (!selected) return;
      tg.sendData(JSON.stringify(selected));
      tg.close();
    });

    window.addEventListener("load", async () => {
      setLoadingText();
      setTimeout(goToUserLocation, 200);
    });
  </script>
</body>
</html>
