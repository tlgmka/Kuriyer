<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xaritadan tanlash</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f7fb;
      color: #111;
    }

    #map-wrap {
      position: relative;
      width: 100%;
      height: 64vh;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .center-marker {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 38px;
      height: 38px;
      transform: translate(-50%, -100%);
      z-index: 1000;
      pointer-events: none;
    }

    .marker-pin {
      position: absolute;
      left: 50%;
      top: 0;
      width: 28px;
      height: 28px;
      background: linear-gradient(180deg, #2d8cff 0%, #0066ff 100%);
      border: 3px solid #fff;
      border-radius: 50% 50% 50% 0;
      transform: translateX(-50%) rotate(-45deg);
      box-shadow: 0 8px 18px rgba(0, 102, 255, 0.35);
    }

    .marker-pin::after {
      content: "";
      position: absolute;
      width: 9px;
      height: 9px;
      background: #fff;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .marker-shadow {
      position: absolute;
      left: 50%;
      bottom: 1px;
      width: 18px;
      height: 7px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 50%;
      transform: translateX(-50%);
      filter: blur(1px);
    }

    .center-marker.moving {
      transform: translate(-50%, -108%);
    }

    .center-marker.idle .marker-pin {
      animation: dropBack 0.22s ease;
    }

    @keyframes dropBack {
      0% {
        transform: translateX(-50%) rotate(-45deg) scale(1.05);
      }
      100% {
        transform: translateX(-50%) rotate(-45deg) scale(1);
      }
    }

    .search-layer {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 1200;
      display: flex;
      justify-content: flex-end;
      pointer-events: none;
    }

    .search-shell {
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    .search-toggle {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,0.14);
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .search-panel {
      width: 0;
      overflow: hidden;
      opacity: 0;
      transition: width 0.28s ease, opacity 0.2s ease;
    }

    .search-panel.open {
      width: min(78vw, 320px);
      opacity: 1;
    }

    .search-box-wrap {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.14);
      overflow: hidden;
    }

    .search-input {
      width: 100%;
      border: none;
      outline: none;
      padding: 12px 14px;
      font-size: 14px;
    }

    .suggestions {
      display: none;
      max-height: 220px;
      overflow-y: auto;
      border-top: 1px solid #f0f0f0;
      background: #fff;
    }

    .suggestion-item {
      padding: 11px 14px;
      font-size: 13px;
      line-height: 1.35;
      cursor: pointer;
      border-bottom: 1px solid #f5f5f5;
      background: #fff;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover {
      background: #f8faff;
    }

    .panel {
      padding: 12px;
      background: #fff;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      margin-top: -10px;
      position: relative;
      z-index: 500;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
      min-height: 36vh;
    }

    .label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .panel-row {
      display: flex;
      align-items: stretch;
      gap: 10px;
      margin-bottom: 12px;
    }

    .address-box {
      flex: 1;
      min-height: 58px;
      background: #f7f7f7;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.6;
      color: #222;
      word-break: break-word;
      margin-bottom: 0;
    }

    .mini-loc-btn {
      width: 52px;
      min-width: 52px;
      border: none;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mini-loc-btn:active {
      transform: scale(0.97);
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: #1f6bff;
      color: white;
    }

    .btn-primary:disabled {
      background: #9ab8ff;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #777;
      text-align: center;
    }

    .loading-text {
      color: #666;
    }

    .leaflet-control-zoom a {
      width: 34px !important;
      height: 34px !important;
      line-height: 34px !important;
      font-size: 18px !important;
    }
  </style>
</head>
<body>

  <div id="map-wrap">
    <div class="search-layer">
      <div class="search-shell">
        <div id="searchPanel" class="search-panel">
          <div class="search-box-wrap">
            <input
              id="searchInput"
              class="search-input"
              type="text"
              placeholder="Manzil qidiring..."
              autocomplete="off"
            />
            <div id="suggestions" class="suggestions"></div>
          </div>
        </div>
        <button id="searchToggle" class="search-toggle">🔍</button>
      </div>
    </div>

    <div id="map"></div>

    <div id="centerMarker" class="center-marker idle">
      <div class="marker-pin"></div>
      <div class="marker-shadow"></div>
    </div>
  </div>

  <div class="panel">
    <div class="label">Tanlangan joy</div>

    <div class="panel-row">
      <div id="address" class="address-box">Hali joy tanlanmagan</div>

      <button id="myLocationBtn" class="mini-loc-btn" type="button" title="Mening joylashuvim">
        📍
      </button>
    </div>

    <button id="sendBtn" class="btn btn-primary" disabled>
      ✅ Tasdiqlash va yuborish
    </button>

    <div class="hint">Xaritani surib joy tanlang yoki qidiruvdan foydalaning</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const type = params.get("type") || "from";

    const addressBox = document.getElementById("address");
    const sendBtn = document.getElementById("sendBtn");
    const myLocationBtn = document.getElementById("myLocationBtn");
    const centerMarker = document.getElementById("centerMarker");

    const searchToggle = document.getElementById("searchToggle");
    const searchPanel = document.getElementById("searchPanel");
    const searchInput = document.getElementById("searchInput");
    const suggestionsBox = document.getElementById("suggestions");

    const defaultLat = 41.3111;
    const defaultLon = 69.2797;

    let selected = null;
    let debounceTimer = null;
    let moveTimer = null;
    let lastRequestId = 0;
    let isSearchOpen = false;

    const map = L.map("map", {
      zoomControl: true,
      attributionControl: false
    }).setView([defaultLat, defaultLon], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19
    }).addTo(map);

    const REGION_ALIASES = {
      "toshkent": "Toshkent",
      "tashkent": "Toshkent",
      "toshkent city": "Toshkent",
      "andijon": "Andijon",
      "andijan": "Andijon",
      "fargona": "Farg'ona",
      "fergana": "Farg'ona",
      "namangan": "Namangan",
      "jizzax": "Jizzax",
      "jizzakh": "Jizzax",
      "samarqand": "Samarqand",
      "samarkand": "Samarqand",
      "sirdaryo": "Sirdaryo",
      "guliston": "Sirdaryo",
      "qashqadaryo": "Qashqadaryo",
      "kashkadarya": "Qashqadaryo",
      "qarshi": "Qashqadaryo",
      "surxondaryo": "Surxondaryo",
      "surkhandarya": "Surxondaryo",
      "termiz": "Surxondaryo",
      "buxoro": "Buxoro",
      "bukhara": "Buxoro",
      "navoiy": "Navoiy",
      "navoi": "Navoiy",
      "xorazm": "Xorazm",
      "khorezm": "Xorazm",
      "urganch": "Xorazm",
      "qoraqalpogiston": "Qoraqalpog'iston",
      "karakalpakstan": "Qoraqalpog'iston",
      "nukus": "Qoraqalpog'iston"
    };

    const CITY_TO_REGION = {
      "andijon": "Andijon",
      "andijan": "Andijon",
      "fargona": "Farg'ona",
      "fergana": "Farg'ona",
      "namangan": "Namangan",
      "jizzax": "Jizzax",
      "jizzakh": "Jizzax",
      "samarqand": "Samarqand",
      "samarkand": "Samarqand",
      "guliston": "Sirdaryo",
      "qarshi": "Qashqadaryo",
      "karshi": "Qashqadaryo",
      "termiz": "Surxondaryo",
      "buxoro": "Buxoro",
      "bukhara": "Buxoro",
      "navoiy": "Navoiy",
      "navoi": "Navoiy",
      "urganch": "Xorazm",
      "nukus": "Qoraqalpog'iston",
      "toshkent": "Toshkent",
      "tashkent": "Toshkent"
    };

    const TASHKENT_DISTRICTS = [
      "Bektemir",
      "Chilonzor",
      "Mirobod",
      "Mirzo Ulug'bek",
      "Olmazor",
      "Sergeli",
      "Shayxontohur",
      "Uchtepa",
      "Yakkasaroy",
      "Yashnobod",
      "Yunusobod",
      "Yangihayot"
    ];

    function cleanName(value) {
      if (!value) return "";
      return String(value).trim().replace(/\s+/g, " ");
    }

    function latinizeUzbek(value) {
      return cleanName(value)
        .toLowerCase()
        .replace(/o‘/g, "o'")
        .replace(/g‘/g, "g'")
        .replace(/ʼ/g, "'")
        .replace(/`/g, "'")
        .replace(/[ʻ’]/g, "'")
        .replace(/yoʻli/g, "yoli")
        .replace(/koʻcha/g, "kocha");
    }

    function stripAdminWords(value) {
      let name = cleanName(value);
      if (!name) return "";

      name = name
        .replace(/\bDistrict\b/gi, "")
        .replace(/\bRegion\b/gi, "")
        .replace(/\bProvince\b/gi, "")
        .replace(/\bCounty\b/gi, "")
        .replace(/\bMunicipality\b/gi, "")
        .replace(/\bTumani\b/gi, "")
        .replace(/\bTuman\b/gi, "")
        .replace(/\bViloyati\b/gi, "")
        .replace(/\bViloyat\b/gi, "")
        .replace(/\bShahri\b/gi, "")
        .replace(/\bShahar\b/gi, "")
        .replace(/\bCity\b/gi, "")
        .trim();

      return name.replace(/\s+/g, " ").trim();
    }

    function normalizeKnownRegion(value) {
      const stripped = stripAdminWords(value);
      const key = latinizeUzbek(stripped);
      return REGION_ALIASES[key] || stripped;
    }

    function normalizeKnownDistrict(value) {
      let v = stripAdminWords(value);
      if (!v) return "";

      const key = latinizeUzbek(v);

      const tashkentMap = {
        "bektemir": "Bektemir",
        "chilonzor": "Chilonzor",
        "chilanzar": "Chilonzor",
        "mirobod": "Mirobod",
        "mirabad": "Mirobod",
        "mirzo ulug'bek": "Mirzo Ulug'bek",
        "mirzo ulugbek": "Mirzo Ulug'bek",
        "olmazor": "Olmazor",
        "almazar": "Olmazor",
        "sergeli": "Sergeli",
        "shayxontohur": "Shayxontohur",
        "shaykhantahur": "Shayxontohur",
        "uchtepa": "Uchtepa",
        "yakkasaroy": "Yakkasaroy",
        "yakkasaray": "Yakkasaroy",
        "yashnobod": "Yashnobod",
        "yunusobod": "Yunusobod",
        "yunusabad": "Yunusobod",
        "yangihayot": "Yangihayot"
      };

      return tashkentMap[key] || v;
    }

    function isBadDistrictName(value) {
      const v = latinizeUzbek(value);
      if (!v) return true;

      const badWords = [
        "mahalla", "mfy", "guzar", "guzari", "daha", "massiv", "mavze",
        "ko'cha", "kocha", "street", "st.", "passage", "passageway",
        "yoli", "road", "avenue", "lane", "residential", "block",
        "qishloq", "ovul", "hamlet", "village", "posyolka", "settlement",
        "kvartal", "microdistrict", "mikrorayon", "neighbourhood",
        "neighborhood", "suburb", "quarter"
      ];

      return badWords.some(word => v.includes(word));
    }

    function uniqueCleanValues(list) {
      const seen = new Set();
      const result = [];

      for (const item of list) {
        const cleaned = stripAdminWords(item);
        if (!cleaned) continue;

        const key = latinizeUzbek(cleaned);
        if (seen.has(key)) continue;

        seen.add(key);
        result.push(cleaned);
      }

      return result;
    }

    function getRegion(addr) {
      const candidates = uniqueCleanValues([
        addr.state,
        addr.region,
        addr.province
      ]);

      let region = normalizeKnownRegion(candidates[0] || "");

      if (!region) {
        const cityLike = stripAdminWords(addr.city || addr.town || "");
        const cityKey = latinizeUzbek(cityLike);
        region = CITY_TO_REGION[cityKey] || "";
      }

      return region || "Toshkent";
    }

    function getDistrict(addr, region) {
      const regionKey = latinizeUzbek(region);

      const rawCandidates = [
        addr.city_district,
        addr.district,
        addr.county,
        addr.municipality,
        addr.city,
        addr.town
      ];

      const candidates = uniqueCleanValues(rawCandidates);

      for (const item of candidates) {
        const normalized = normalizeKnownDistrict(item);
        const itemKey = latinizeUzbek(normalized);

        if (!itemKey) continue;
        if (isBadDistrictName(normalized)) continue;
        if (itemKey === regionKey) continue;

        return normalized;
      }

      return "";
    }

    function inferDistrictFromDisplayName(displayName, region) {
      const text = cleanName(displayName);
      if (!text) return "";

      const parts = text.split(",").map(s => stripAdminWords(s)).filter(Boolean);
      const regionKey = latinizeUzbek(region);

      for (const part of parts) {
        const normalized = normalizeKnownDistrict(part);
        const key = latinizeUzbek(normalized);

        if (!key) continue;
        if (isBadDistrictName(normalized)) continue;
        if (key === regionKey) continue;

        if (latinizeUzbek(region) === "toshkent") {
          const matched = TASHKENT_DISTRICTS.find(d => latinizeUzbek(d) === key);
          if (matched) return matched;
        }

        return normalized;
      }

      return "";
    }

    function normalizeUzbekAdmin(addr, displayName) {
      let region = getRegion(addr);
      let district = getDistrict(addr, region);

      const city = normalizeKnownDistrict(addr.city);
      const town = normalizeKnownDistrict(addr.town);
      const county = normalizeKnownDistrict(addr.county);
      const districtField = normalizeKnownDistrict(addr.district);
      const cityDistrict = normalizeKnownDistrict(addr.city_district);

      if (!district || latinizeUzbek(district) === latinizeUzbek(region)) {
        district =
          cityDistrict ||
          districtField ||
          county ||
          city ||
          town ||
          "";
      }

      if (!district || isBadDistrictName(district)) {
        district = inferDistrictFromDisplayName(displayName, region);
      }

      if (!district || isBadDistrictName(district)) {
        district =
          cityDistrict ||
          districtField ||
          county ||
          city ||
          town ||
          region;
      }

      region = normalizeKnownRegion(region);
      district = normalizeKnownDistrict(district);

      if (!district) district = region;

      const regionKey = latinizeUzbek(region);
      const districtKey = latinizeUzbek(district);

      if (regionKey === "toshkent") {
        const matched = TASHKENT_DISTRICTS.find(d => latinizeUzbek(d) === districtKey);
        if (matched) {
          district = matched;
        } else {
          district =
            normalizeKnownDistrict(cityDistrict) ||
            normalizeKnownDistrict(districtField) ||
            normalizeKnownDistrict(county) ||
            "Toshkent";
        }
      }

      if (districtKey === regionKey && regionKey !== "toshkent") {
        district =
          normalizeKnownDistrict(cityDistrict) ||
          normalizeKnownDistrict(districtField) ||
          normalizeKnownDistrict(county) ||
          normalizeKnownDistrict(city) ||
          normalizeKnownDistrict(town) ||
          region;
      }

      if (!district || isBadDistrictName(district)) {
        district = region;
      }

      return {
        region,
        district
      };
    }

    async function reverseGeocode(lat, lon) {
      try {
        const requestId = ++lastRequestId;

        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=jsonv2&zoom=18&addressdetails=1&lat=${lat}&lon=${lon}&accept-language=uz`
        );

        const data = await res.json();

        if (requestId !== lastRequestId) {
          return null;
        }

        const addr = data.address || {};
        const normalized = normalizeUzbekAdmin(addr, data.display_name || "");

        return {
          address: data.display_name || `${lat}, ${lon}`,
          region: normalized.region,
          district: normalized.district
        };
      } catch (e) {
        return {
          address: `${lat}, ${lon}`,
          region: "Toshkent",
          district: "Toshkent"
        };
      }
    }

    async function searchPlaces(query) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(query)}&accept-language=uz&countrycodes=uz&limit=5`
        );
        return await res.json();
      } catch (e) {
        return [];
      }
    }

    function renderSuggestions(items) {
      if (!items.length) {
        suggestionsBox.innerHTML = "";
        suggestionsBox.style.display = "none";
        return;
      }

      suggestionsBox.innerHTML = items.map(item => `
        <div class="suggestion-item" data-lat="${item.lat}" data-lon="${item.lon}">
          ${item.display_name}
        </div>
      `).join("");

      suggestionsBox.style.display = "block";
    }

    async function updateCenterAddress() {
      const center = map.getCenter();
      const lat = center.lat;
      const lon = center.lng;

      addressBox.innerHTML = `<span class="loading-text">⏳ Manzil aniqlanmoqda...</span>`;
      sendBtn.disabled = true;

      const geo = await reverseGeocode(lat, lon);
      if (!geo) return;

      selected = {
        lat,
        lon,
        address: geo.address,
        region: geo.region,
        district: geo.district,
        type
      };

      addressBox.innerHTML = `
        <b>Hudud:</b> ${geo.region}<br>
        <b>Tuman/Shahar:</b> ${geo.district}
      `;

      sendBtn.disabled = false;
    }

    function startMovingState() {
      centerMarker.classList.remove("idle");
      centerMarker.classList.add("moving");
      addressBox.innerHTML = `<span class="loading-text">⏳ Joy tanlanmoqda...</span>`;
      sendBtn.disabled = true;
    }

    function endMovingState() {
      centerMarker.classList.remove("moving");
      centerMarker.classList.add("idle");
    }

    function scheduleAddressUpdate() {
      clearTimeout(moveTimer);
      moveTimer = setTimeout(async () => {
        endMovingState();
        await updateCenterAddress();
      }, 350);
    }

    function goToCurrentLocation() {
      if (!navigator.geolocation) {
        map.setView([defaultLat, defaultLon], 12);
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          map.setView([pos.coords.latitude, pos.coords.longitude], 16);
        },
        () => {
          map.setView([defaultLat, defaultLon], 12);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    searchToggle.addEventListener("click", () => {
      isSearchOpen = !isSearchOpen;
      searchPanel.classList.toggle("open", isSearchOpen);

      if (isSearchOpen) {
        setTimeout(() => searchInput.focus(), 180);
      } else {
        searchInput.value = "";
        suggestionsBox.innerHTML = "";
        suggestionsBox.style.display = "none";
      }
    });

    searchInput.addEventListener("input", function () {
      const value = this.value.trim();
      clearTimeout(debounceTimer);

      if (value.length < 3) {
        renderSuggestions([]);
        return;
      }

      debounceTimer = setTimeout(async () => {
        const results = await searchPlaces(value);
        renderSuggestions(results);
      }, 300);
    });

    suggestionsBox.addEventListener("click", (e) => {
      const item = e.target.closest(".suggestion-item");
      if (!item) return;

      const lat = parseFloat(item.dataset.lat);
      const lon = parseFloat(item.dataset.lon);

      suggestionsBox.style.display = "none";
      map.setView([lat, lon], 17);
    });

    document.addEventListener("click", function (e) {
      const insideSearch = e.target.closest(".search-shell");
      if (!insideSearch) {
        suggestionsBox.style.display = "none";
      }
    });

    myLocationBtn.addEventListener("click", goToCurrentLocation);

    map.on("movestart", () => {
      startMovingState();
      clearTimeout(moveTimer);
    });

    map.on("move", () => {
      startMovingState();
      clearTimeout(moveTimer);
    });

    map.on("moveend", () => {
      scheduleAddressUpdate();
    });

    sendBtn.addEventListener("click", function () {
      if (!selected) return;
      tg.sendData(JSON.stringify(selected));
      tg.close();
    });

    goToCurrentLocation();

    setTimeout(() => {
      updateCenterAddress();
    }, 700);
  </script>
</body>
</html>
